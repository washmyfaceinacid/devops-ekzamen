name: Terraform CI/CD (AWS)

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_region: ${{ secrets.AWS_REGION }}
      TF_VAR_key_name: ${{ secrets.AWS_KEY_PAIR_NAME }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate backend configuration values
        run: |
          missing=0
          for v in TF_STATE_BUCKET TF_STATE_KEY TF_STATE_REGION; do
            if [ -z "${!v}" ] || [ "${!v}" = "null" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Backend config is incomplete. Set TF_STATE_BUCKET, TF_STATE_KEY, TF_STATE_REGION in repository secrets."
            exit 1
          fi

      - name: Terraform Init (remote state)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET:-vasylyshyn-tfstate}" \
            -backend-config="key=${TF_STATE_KEY:-terraform/devops-ekzamen.tfstate}" \
            -backend-config="region=${TF_STATE_REGION:-eu-central-1}"

      - name: Terraform Fmt Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: validate
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_region: ${{ secrets.AWS_REGION }}
      TF_VAR_key_name: ${{ secrets.AWS_KEY_PAIR_NAME }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate backend configuration values
        run: |
          missing=0
          for v in TF_STATE_BUCKET TF_STATE_KEY TF_STATE_REGION; do
            if [ -z "${!v}" ] || [ "${!v}" = "null" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Backend config is incomplete. Set TF_STATE_BUCKET, TF_STATE_KEY, TF_STATE_REGION in repository secrets."
            exit 1
          fi

      - name: Terraform Init (remote state)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET:-vasylyshyn-tfstate}" \
            -backend-config="key=${TF_STATE_KEY:-terraform/devops-ekzamen.tfstate}" \
            -backend-config="region=${TF_STATE_REGION:-eu-central-1}"

      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      TF_IN_AUTOMATION: true
      TF_VAR_region: ${{ secrets.AWS_REGION }}
      TF_VAR_key_name: ${{ secrets.AWS_KEY_PAIR_NAME }}
      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_STATE_KEY: ${{ secrets.TF_STATE_KEY }}
      TF_STATE_REGION: ${{ secrets.TF_STATE_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Validate backend configuration values
        run: |
          missing=0
          for v in TF_STATE_BUCKET TF_STATE_KEY TF_STATE_REGION; do
            if [ -z "${!v}" ] || [ "${!v}" = "null" ]; then
              echo "::error::Missing required secret: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Backend config is incomplete. Set TF_STATE_BUCKET, TF_STATE_KEY, TF_STATE_REGION in repository secrets."
            exit 1
          fi

      - name: Terraform Init (remote state)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET:-vasylyshyn-tfstate}" \
            -backend-config="key=${TF_STATE_KEY:-terraform/devops-ekzamen.tfstate}" \
            -backend-config="region=${TF_STATE_REGION:-eu-central-1}"

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve tfplan
