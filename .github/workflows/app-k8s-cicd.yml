name: App Build/Push and Kubernetes Deploy

on:
  push:
    branches: [develop]
    tags: ["1.0.0"]
  workflow_dispatch:
    inputs:
      action:
        description: "Pipeline action"
        type: choice
        options: [deploy, rollback]
        default: deploy
        required: true
      target_environment:
        description: "Environment to process"
        type: choice
        options: [dev, release, both]
        default: both
        required: true
      dry_run_only:
        description: "Run validation only (no deployment)"
        type: boolean
        default: false
        required: true
      ecr_repository:
        description: "ECR repository name"
        type: string
        default: vasylyshyn-repo
        required: true
      eks_cluster_name:
        description: "EKS cluster name"
        type: string
        default: vasylyshyn-eks-cluster
        required: true
      rollback_revision:
        description: "Helm revision for rollback"
        type: string
        default: "1"
        required: false

permissions:
  contents: read

concurrency:
  group: app-k8s-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  APP_CONTEXT: task3/devops-exam-pt2
  HELM_CHART_PATH: task3/devops-exam-pt2/helm-charts-hello-world

jobs:
  build_dev_image:
    name: Build and Push Dev Image
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' && (inputs.target_environment == 'dev' || inputs.target_environment == 'both'))
    outputs:
      image_repository: ${{ steps.meta.outputs.image_repository }}
      image_tag: develop

    steps:
      - name: Checkout develop source
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        env:
          ECR_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.ecr_repository || 'vasylyshyn-repo' }}
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Set image metadata
        id: meta
        env:
          ECR_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.ecr_repository || 'vasylyshyn-repo' }}
        run: |
          echo "image_repository=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Build and push develop image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_CONTEXT }}
          file: ${{ env.APP_CONTEXT }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_repository }}:develop

  build_release_image:
    name: Build and Push Release Image
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/1.0.0')) ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' && (inputs.target_environment == 'release' || inputs.target_environment == 'both'))
    outputs:
      image_repository: ${{ steps.meta.outputs.image_repository }}
      image_tag: 1.0.0

    steps:
      - name: Checkout release source (tag 1.0.0)
        uses: actions/checkout@v4
        with:
          ref: refs/tags/1.0.0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        env:
          ECR_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.ecr_repository || 'vasylyshyn-repo' }}
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY"

      - name: Set image metadata
        id: meta
        env:
          ECR_REPOSITORY: ${{ github.event_name == 'workflow_dispatch' && inputs.ecr_repository || 'vasylyshyn-repo' }}
        run: |
          echo "image_repository=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.APP_CONTEXT }}
          file: ${{ env.APP_CONTEXT }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image_repository }}:1.0.0

  validate_dev_deploy:
    name: Validate Dev Deployment (Dry-Run)
    runs-on: ubuntu-latest
    needs: build_dev_image
    if: needs.build_dev_image.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="0.6.7"
          curl -L "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" -o /tmp/kubeconform.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Helm lint and render (dev)
        run: |
          helm lint "$HELM_CHART_PATH" -f "$HELM_CHART_PATH/values.yaml" -f "$HELM_CHART_PATH/values-dev.yaml"
          helm template hello-world-dev "$HELM_CHART_PATH" \
            -f "$HELM_CHART_PATH/values.yaml" \
            -f "$HELM_CHART_PATH/values-dev.yaml" \
            --set image.repository="${{ needs.build_dev_image.outputs.image_repository }}" \
            --set image.tag="develop" \
            --set service.port=8002 > rendered-dev.yaml
          kubeconform -strict -summary rendered-dev.yaml

  validate_release_deploy:
    name: Validate Release Deployment (Dry-Run)
    runs-on: ubuntu-latest
    needs: build_release_image
    if: needs.build_release_image.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kubeconform
        run: |
          KUBECONFORM_VERSION="0.6.7"
          curl -L "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" -o /tmp/kubeconform.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Helm lint and render (release)
        run: |
          helm lint "$HELM_CHART_PATH" -f "$HELM_CHART_PATH/values.yaml" -f "$HELM_CHART_PATH/values-prod.yaml"
          helm template hello-world-release "$HELM_CHART_PATH" \
            -f "$HELM_CHART_PATH/values.yaml" \
            -f "$HELM_CHART_PATH/values-prod.yaml" \
            --set image.repository="${{ needs.build_release_image.outputs.image_repository }}" \
            --set image.tag="1.0.0" \
            --set service.port=8003 > rendered-release.yaml
          kubeconform -strict -summary rendered-release.yaml

  deploy_dev:
    name: Deploy Dev to EKS
    runs-on: ubuntu-latest
    needs: [build_dev_image, validate_dev_deploy]
    if: |
      needs.validate_dev_deploy.result == 'success' &&
      ((github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' && (inputs.target_environment == 'dev' || inputs.target_environment == 'both') && inputs.dry_run_only == false))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        env:
          EKS_CLUSTER_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.eks_cluster_name || 'vasylyshyn-eks-cluster' }}
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Deploy dev release with Helm
        run: |
          helm upgrade --install hello-world-dev "$HELM_CHART_PATH" \
            --namespace dev --create-namespace \
            -f "$HELM_CHART_PATH/values.yaml" \
            -f "$HELM_CHART_PATH/values-dev.yaml" \
            --set image.repository="${{ needs.build_dev_image.outputs.image_repository }}" \
            --set image.tag="develop" \
            --set service.port=8002 \
            --wait --timeout 10m --atomic

  deploy_release:
    name: Deploy Release to EKS
    runs-on: ubuntu-latest
    needs: [build_release_image, validate_release_deploy]
    if: |
      needs.validate_release_deploy.result == 'success' &&
      ((github.event_name == 'push' && startsWith(github.ref, 'refs/tags/1.0.0')) ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy' && (inputs.target_environment == 'release' || inputs.target_environment == 'both') && inputs.dry_run_only == false))

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        env:
          EKS_CLUSTER_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.eks_cluster_name || 'vasylyshyn-eks-cluster' }}
        run: |
          aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Deploy release with Helm
        run: |
          helm upgrade --install hello-world-release "$HELM_CHART_PATH" \
            --namespace release --create-namespace \
            -f "$HELM_CHART_PATH/values.yaml" \
            -f "$HELM_CHART_PATH/values-prod.yaml" \
            --set image.repository="${{ needs.build_release_image.outputs.image_repository }}" \
            --set image.tag="1.0.0" \
            --set service.port=8003 \
            --wait --timeout 10m --atomic

  rollback:
    name: Rollback Helm Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'rollback'

    steps:
      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name "${{ inputs.eks_cluster_name }}" --region "$AWS_REGION"

      - name: Rollback selected environment
        run: |
          if [ "${{ inputs.target_environment }}" = "dev" ]; then
            helm rollback hello-world-dev "${{ inputs.rollback_revision }}" -n dev --wait --timeout 10m
          elif [ "${{ inputs.target_environment }}" = "release" ]; then
            helm rollback hello-world-release "${{ inputs.rollback_revision }}" -n release --wait --timeout 10m
          else
            echo "For rollback, select either dev or release."
            exit 1
          fi
