name: Ansible Kubernetes Stack CI/CD

on:
  pull_request:
    branches: [ main ]
    paths:
      - ansible/**
      - .github/workflows/ansible-k8s-cicd.yml
  push:
    branches: [ main ]
    paths:
      - ansible/**
      - .github/workflows/ansible-k8s-cicd.yml

permissions:
  contents: read

env:
  ANSIBLE_TARGET_HOSTS: ${{ vars.ANSIBLE_TARGET_HOSTS }}
  ANSIBLE_SSH_USER: ${{ vars.ANSIBLE_SSH_USER }}
  ANSIBLE_SSH_PORT: ${{ vars.ANSIBLE_SSH_PORT }}
  MINIKUBE_PROFILE: ${{ vars.MINIKUBE_PROFILE }}
  MINIKUBE_PROXY_BIND_ADDRESS: ${{ vars.MINIKUBE_PROXY_BIND_ADDRESS }}
  MINIKUBE_PROXY_PORT: ${{ vars.MINIKUBE_PROXY_PORT }}

jobs:
  validate:
    name: Validate and Dry-Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core==2.17.6

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing required secret: ANSIBLE_SSH_PRIVATE_KEY"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > "$RUNNER_TEMP/ansible_key"
          chmod 600 "$RUNNER_TEMP/ansible_key"

      - name: Build Ansible inventory from inputs
        env:
          TARGET_HOSTS: ${{ env.ANSIBLE_TARGET_HOSTS }}
          SSH_USER: ${{ env.ANSIBLE_SSH_USER }}
          SSH_PORT: ${{ env.ANSIBLE_SSH_PORT }}
        run: |
          SSH_USER="${SSH_USER:-ubuntu}"
          SSH_PORT="${SSH_PORT:-22}"

          if [ -z "$TARGET_HOSTS" ]; then
            echo "::error::Repository variable ANSIBLE_TARGET_HOSTS is empty"
            exit 1
          fi

          mkdir -p ansible/inventory
          echo "[k8s_nodes]" > ansible/inventory/generated.ini

          IFS=',' read -r -a HOSTS <<< "$TARGET_HOSTS"
          count=0
          for raw in "${HOSTS[@]}"; do
            host=$(echo "$raw" | xargs)
            if [ -z "$host" ]; then
              continue
            fi
            echo "$host ansible_user=$SSH_USER ansible_port=$SSH_PORT ansible_ssh_private_key_file=$RUNNER_TEMP/ansible_key" >> ansible/inventory/generated.ini
            ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null || true
            count=$((count + 1))
          done

          if [ "$count" -eq 0 ]; then
            echo "::error::No valid hosts found in target_hosts input"
            exit 1
          fi

      - name: Ansible syntax check
        working-directory: ansible
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
        run: |
          ansible-playbook playbooks/install-k8s-stack.yml --syntax-check

      - name: Ansible dry-run check mode
        working-directory: ansible
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
        run: |
          SSH_USER="${ANSIBLE_SSH_USER:-ubuntu}"
          MINIKUBE_PROFILE_VAL="${MINIKUBE_PROFILE:-minikube}"
          PROXY_BIND_VAL="${MINIKUBE_PROXY_BIND_ADDRESS:-0.0.0.0}"
          PROXY_PORT_VAL="${MINIKUBE_PROXY_PORT:-8001}"

          ansible-playbook playbooks/install-k8s-stack.yml \
            --check --diff \
            --extra-vars "minikube_run_user=${SSH_USER}" \
            --extra-vars "minikube_profile=${MINIKUBE_PROFILE_VAL}" \
            --extra-vars "proxy_bind_address=${PROXY_BIND_VAL}" \
            --extra-vars "proxy_port=${PROXY_PORT_VAL}"

  apply:
    name: Apply Installation
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core==2.17.6

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing required secret: ANSIBLE_SSH_PRIVATE_KEY"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > "$RUNNER_TEMP/ansible_key"
          chmod 600 "$RUNNER_TEMP/ansible_key"

      - name: Build Ansible inventory from inputs
        env:
          TARGET_HOSTS: ${{ env.ANSIBLE_TARGET_HOSTS }}
          SSH_USER: ${{ env.ANSIBLE_SSH_USER }}
          SSH_PORT: ${{ env.ANSIBLE_SSH_PORT }}
        run: |
          SSH_USER="${SSH_USER:-ubuntu}"
          SSH_PORT="${SSH_PORT:-22}"

          if [ -z "$TARGET_HOSTS" ]; then
            echo "::error::Repository variable ANSIBLE_TARGET_HOSTS is empty"
            exit 1
          fi

          mkdir -p ansible/inventory
          echo "[k8s_nodes]" > ansible/inventory/generated.ini

          IFS=',' read -r -a HOSTS <<< "$TARGET_HOSTS"
          count=0
          for raw in "${HOSTS[@]}"; do
            host=$(echo "$raw" | xargs)
            if [ -z "$host" ]; then
              continue
            fi
            echo "$host ansible_user=$SSH_USER ansible_port=$SSH_PORT ansible_ssh_private_key_file=$RUNNER_TEMP/ansible_key" >> ansible/inventory/generated.ini
            ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null || true
            count=$((count + 1))
          done

          if [ "$count" -eq 0 ]; then
            echo "::error::No valid hosts found in target_hosts input"
            exit 1
          fi

      - name: Install Kubernetes stack
        working-directory: ansible
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
        run: |
          SSH_USER="${ANSIBLE_SSH_USER:-ubuntu}"
          MINIKUBE_PROFILE_VAL="${MINIKUBE_PROFILE:-minikube}"
          PROXY_BIND_VAL="${MINIKUBE_PROXY_BIND_ADDRESS:-0.0.0.0}"
          PROXY_PORT_VAL="${MINIKUBE_PROXY_PORT:-8001}"

          ansible-playbook playbooks/install-k8s-stack.yml \
            --extra-vars "minikube_run_user=${SSH_USER}" \
            --extra-vars "minikube_profile=${MINIKUBE_PROFILE_VAL}" \
            --extra-vars "proxy_bind_address=${PROXY_BIND_VAL}" \
            --extra-vars "proxy_port=${PROXY_PORT_VAL}"
