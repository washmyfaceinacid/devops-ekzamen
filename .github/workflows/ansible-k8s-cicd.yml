name: Ansible Kubernetes Stack CI/CD

on:
  pull_request:
    branches: [ main ]
    paths:
      - ansible/**
      - .github/workflows/ansible-k8s-cicd.yml
  push:
    branches: [ main ]
    paths:
      - ansible/**
      - .github/workflows/ansible-k8s-cicd.yml

permissions:
  contents: read

jobs:
  validate:
    name: Validate and Dry-Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core==2.17.6

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing required secret: ANSIBLE_SSH_PRIVATE_KEY"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > "$RUNNER_TEMP/ansible_key"
          chmod 600 "$RUNNER_TEMP/ansible_key"

      - name: Validate static inventory
        run: |
          if [ ! -f ansible/inventory/hosts.ini ]; then
            echo "::error::Missing ansible/inventory/hosts.ini"
            exit 1
          fi
          if ! grep -Eq '^[^#[:space:]].*ansible_user=' ansible/inventory/hosts.ini; then
            echo "::error::Inventory has no configured hosts with ansible_user"
            exit 1
          fi

          awk 'NF && $1 !~ /^\[/' ansible/inventory/hosts.ini | while read -r host _; do
            ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null || true
          done

      - name: Ansible syntax check
        working-directory: ansible
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
        run: |
          ansible-playbook playbooks/install-k8s-stack.yml --syntax-check

      - name: Ansible dry-run check mode
        working-directory: ansible
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
        run: |
          MINIKUBE_PROFILE_VAL="minikube"
          PROXY_BIND_VAL="0.0.0.0"
          PROXY_PORT_VAL="8001"

          ansible-playbook playbooks/install-k8s-stack.yml \
            --check --diff \
            --private-key "$RUNNER_TEMP/ansible_key" \
            --extra-vars "minikube_profile=${MINIKUBE_PROFILE_VAL}" \
            --extra-vars "proxy_bind_address=${PROXY_BIND_VAL}" \
            --extra-vars "proxy_port=${PROXY_PORT_VAL}"

  apply:
    name: Apply Installation
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core==2.17.6

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Missing required secret: ANSIBLE_SSH_PRIVATE_KEY"
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf "%s\n" "$SSH_PRIVATE_KEY" > "$RUNNER_TEMP/ansible_key"
          chmod 600 "$RUNNER_TEMP/ansible_key"

      - name: Validate static inventory
        run: |
          if [ ! -f ansible/inventory/hosts.ini ]; then
            echo "::error::Missing ansible/inventory/hosts.ini"
            exit 1
          fi
          if ! grep -Eq '^[^#[:space:]].*ansible_user=' ansible/inventory/hosts.ini; then
            echo "::error::Inventory has no configured hosts with ansible_user"
            exit 1
          fi

          awk 'NF && $1 !~ /^\[/' ansible/inventory/hosts.ini | while read -r host _; do
            ssh-keyscan -H "$host" >> ~/.ssh/known_hosts 2>/dev/null || true
          done

      - name: Install Kubernetes stack
        working-directory: ansible
        env:
          ANSIBLE_CONFIG: ${{ github.workspace }}/ansible/ansible.cfg
        run: |
          MINIKUBE_PROFILE_VAL="minikube"
          PROXY_BIND_VAL="0.0.0.0"
          PROXY_PORT_VAL="8001"

          ansible-playbook playbooks/install-k8s-stack.yml \
            --private-key "$RUNNER_TEMP/ansible_key" \
            --extra-vars "minikube_profile=${MINIKUBE_PROFILE_VAL}" \
            --extra-vars "proxy_bind_address=${PROXY_BIND_VAL}" \
            --extra-vars "proxy_port=${PROXY_PORT_VAL}"
