---
- name: install Kubernetes stack
  hosts: k8s_nodes
  become: true
  gather_facts: true

  vars:
    kubectl_version: "v1.30.2"
    minikube_version: "v1.33.1"
    helm_version: "v3.16.2"
    minikube_profile: "minikube"
    minikube_run_user: "ubuntu"
    proxy_bind_address: "0.0.0.0"
    proxy_port: 8001
    docker_arch_map:
      x86_64: amd64
      aarch64: arm64

  pre_tasks:
    - name: ensure OS is Ubuntu 24+
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - (ansible_distribution_major_version | int) >= 24
        fail_msg: "this playbook supports Ubuntu 24+ only"

    - name: ensure apt keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

  tasks:
    - name: install required base packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - conntrack
          - socat
        state: present
        update_cache: true

    - name: add Docker apt repository key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: configure Docker apt repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_arch_map.get(ansible_architecture, 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present

    - name: install Docker engine packages
      block:
        - name: install Docker CE packages from Docker repo
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: true
      rescue:
        - name: enable Ubuntu universe repository for docker.io fallback
          ansible.builtin.apt_repository:
            repo: "deb http://archive.ubuntu.com/ubuntu {{ ansible_distribution_release }} universe"
            filename: ubuntu-universe
            state: present

        - name: install docker.io fallback package
          ansible.builtin.apt:
            name:
              - docker.io
            state: present
            update_cache: true
          failed_when: false
          register: docker_io_install

        - name: install Docker via official convenience script when apt fallback fails
          ansible.builtin.shell: |
            set -euo pipefail
            curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
            sh /tmp/get-docker.sh
          args:
            executable: /bin/bash
          when: docker_io_install is failed

    - name: collect service facts
      ansible.builtin.service_facts:

    - name: detect Docker service unit
      ansible.builtin.set_fact:
        docker_service_name: >-
          {{
            'docker' if 'docker.service' in ansible_facts.services
            else ('docker.io' if 'docker.io.service' in ansible_facts.services else '')
          }}

    - name: enable and start Docker service
      ansible.builtin.service:
        name: "{{ docker_service_name }}"
        state: started
        enabled: true
      when:
        - not ansible_check_mode
        - docker_service_name != ''

    - name: fail when Docker service unit is not found
      ansible.builtin.fail:
        msg: "Docker service unit was not found after installation (expected docker.service or docker.io.service)."
      when:
        - not ansible_check_mode
        - docker_service_name == ''

    - name: install kubectl binary
      ansible.builtin.get_url:
        url: "https://dl.k8s.io/release/{{ kubectl_version }}/bin/linux/amd64/kubectl"
        dest: /usr/local/bin/kubectl
        mode: "0755"

    - name: download Minikube binary
      ansible.builtin.get_url:
        url: "https://storage.googleapis.com/minikube/releases/{{ minikube_version }}/minikube-linux-amd64"
        dest: /usr/local/bin/minikube
        mode: "0755"

    - name: download Helm archive
      ansible.builtin.get_url:
        url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
        dest: /tmp/helm.tar.gz
        mode: "0644"

    - name: extract Helm archive
      ansible.builtin.unarchive:
        src: /tmp/helm.tar.gz
        dest: /tmp
        remote_src: true
      when: not ansible_check_mode

    - name: install Helm binary
      ansible.builtin.copy:
        src: /tmp/linux-amd64/helm
        dest: /usr/local/bin/helm
        mode: "0755"
        remote_src: true
      when: not ansible_check_mode

    - name: ensure docker group exists
      ansible.builtin.group:
        name: docker
        state: present
      when: not ansible_check_mode

    - name: ensure minikube owner exists in docker group
      ansible.builtin.user:
        name: "{{ minikube_run_user }}"
        groups: docker
        append: true
      when: not ansible_check_mode

    - name: check minikube status
      ansible.builtin.command: "minikube status -p {{ minikube_profile }}"
      become_user: "{{ minikube_run_user }}"
      register: minikube_status
      changed_when: false
      failed_when: false

    - name: start minikube with docker driver when not running
      ansible.builtin.command: "minikube start -p {{ minikube_profile }} --driver=docker"
      become_user: "{{ minikube_run_user }}"
      when: minikube_status.rc != 0

    - name: install minikube proxy systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/minikube-proxy.service
        mode: "0644"
        content: |
          [Unit]
          Description=Minikube kubectl proxy
          After=network.target docker.service
          Wants=docker.service

          [Service]
          Type=simple
          User={{ minikube_run_user }}
          ExecStart=/usr/local/bin/minikube -p {{ minikube_profile }} kubectl -- proxy --address={{ proxy_bind_address }} --accept-hosts=.* --port={{ proxy_port }}
          Restart=always
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
      notify: restart minikube proxy
      when: not ansible_check_mode

    - name: enable and start minikube proxy
      ansible.builtin.systemd:
        name: minikube-proxy.service
        daemon_reload: true
        enabled: true
        state: started
      when: not ansible_check_mode

  handlers:
    - name: restart minikube proxy
      ansible.builtin.systemd:
        name: minikube-proxy.service
        daemon_reload: true
        state: restarted
